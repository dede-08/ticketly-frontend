<div class="sidebar h-screen w-64 bg-sky-200 shadow-lg fixed left-0 top-0 flex flex-col z-10">
  <!-- Logo -->
  <div class="p-4 border-b border-sky-300">
    <a routerLink="/dashboard" class="flex items-center space-x-2 hover:opacity-80 transition">
      <img src="assets/images/logo_ticketly.png" alt="" class="w-16 h-16 items-center flex" />
    </a>
  </div>

  <!-- Navigation Links -->
  <div class="flex-1 px-4 py-4 space-y-2">
    <a
      routerLink="/dashboard"
      routerLinkActive="bg-sky-300 text-blue-600"
      [routerLinkActiveOptions]="{ exact: true }"
      class="block py-2 px-4 rounded-lg text-gray-700 hover:bg-sky-300 hover:text-blue-600 transition font-medium"
    >
      Dashboard
    </a>
    <a
      routerLink="/tickets"
      routerLinkActive="bg-sky-300 text-blue-600"
      class="block py-2 px-4 rounded-lg text-gray-700 hover:bg-sky-300 hover:text-blue-600 transition font-medium"
    >
      Tickets
    </a>
    <a
      routerLink="/tickets"
      routerLinkActive="bg-sky-300 text-blue-600"
      class="block py-2 px-4 rounded-lg text-gray-700 hover:bg-sky-300 hover:text-blue-600 transition font-medium"
    >
      Historial
    </a>
  </div>

  <!-- User Info -->
  @if (authService.currentUser()) {
    <div class="p-4 border-t border-sky-200 flex justify-center">
      <div class="flex items-center space-x-2">
        <span class="material-symbols-outlined text-2xl"> account_circle </span>
        <div class="flex flex-col">
          <span class="text-sm text-gray-600">{{
            authService.currentUser()!.username || 'Usuario'
          }}</span>
          <span class="text-sm font-semibold text-gray-800">
            {{ authService.currentUser()!.first_name }} {{ authService.currentUser()!.last_name }}
          </span>
        </div>
      </div>
    </div>
  } @else {
    <div class="p-4 bg-yellow-100 border-t border-yellow-200">
      <span class="text-xs text-yellow-700">Cargando usuario...</span>
    </div>
  }

  <!-- Buttons -->
  <div class="p-4 space-y-2 border-t border-sky-200">
    <button
      routerLink="/tickets/new"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg transition font-medium shadow-md hover:shadow-lg"
    >
      + Nuevo Ticket
    </button>
    <button
      (click)="logout()"
      class="w-full bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded-lg transition font-medium shadow-md hover:shadow-lg"
    >
      Cerrar Sesión
    </button>
  </div>
</div>
